<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Cadastro de Aluno</title>
	<link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container pequeno">
	<h1>Cadastro de Aluno</h1>

	<form th:action="@{/alunos/cadastrar}" method="post" class="formulario">
		<label for="nome">Nome</label>
		<input id="nome" name="nome" type="text" required>

		<label for="matricula">Matricula</label>
		<input id="matricula" name="matricula" type="text" required>

		<label for="curso">Curso</label>
		<input id="curso" name="curso" type="text" required>

		<label for="semestre">Semestre</label>
		<input id="semestre" name="semestre" type="number" min="1" required>

		<div class="acoes-formulario">
			<button class="btn btn-principal" type="submit">Salvar</button>
			<a class="btn" th:href="@{/alunos}">Voltar</a>
		</div>
	</form>
</div>
</body>
</html>
