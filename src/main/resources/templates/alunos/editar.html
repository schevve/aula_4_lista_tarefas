<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Aluno</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container pequeno">
    <h1>Editar Aluno</h1>

    <form th:action="@{/alunos/editar/{id}(id=${aluno.id})}" method="post" class="formulario">
        <label for="nome">Nome</label>
        <input id="nome" name="nome" type="text" th:value="${aluno.nome}" required>

        <label for="matricula">Matricula</label>
        <input id="matricula" name="matricula" type="text" th:value="${aluno.matricula}" required>

        <label for="curso">Curso</label>
        <input id="curso" name="curso" type="text" th:value="${aluno.curso}" required>

        <label for="semestre">Semestre</label>
        <input id="semestre" name="semestre" type="number" min="1" th:value="${aluno.semestre}" required>

        <div class="acoes-formulario">
            <button class="btn btn-principal" type="submit">Atualizar</button>
            <a class="btn" th:href="@{/alunos}">Voltar</a>
        </div>
    </form>
</div>
</body>
</html>
